[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"

# Optimizer settings — match what an auditor would expect
optimizer = true
optimizer_runs = 200

# For Etherscan verification on Sepolia
[profile.default.etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api" }

[rpc_endpoints]
sepolia  = "${SEPOLIA_RPC_URL}"
mainnet  = "${MAINNET_RPC_URL}"

# fmt settings
[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = true
